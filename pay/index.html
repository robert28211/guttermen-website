<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay Online | The Guttermen</title>
  <link rel="icon" type="image/png" href="/img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/_astro/commercial.CsoPTAXD.css">
  <!-- Google Ads + GA4 -->

<script type="text/javascript">(function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y)})(window,document,"clarity","script","vmy9zlpk0f");</script></head>
<body class="font-main bg-slate-50" style="min-height:100vh;">

  <!-- Header -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-white shadow-sm border-b border-slate-100">
    <div class="container-xl mx-auto px-4">
      <div class="flex items-center justify-between py-3" style="height:4.5rem;">
        <a href="/">
          <img src="/img/logo.png" alt="The Guttermen" class="h-12 w-auto">
        </a>
        <a href="tel:8037917147" class="text-sm font-bold text-navy">(803) 791-7147</a>
      </div>
    </div>
  </header>

  <!-- Pay Form -->
  <main class="pt-[72px]" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;">
    <div style="width:100%;max-width:480px;">

      <!-- Card -->
      <div style="background:white;border-radius:1rem;padding:2.5rem;box-shadow:0 4px 24px rgba(0,0,0,.1);">

        <!-- Logo + Title -->
        <div style="text-align:center;margin-bottom:2rem;">
          <img src="/img/logo.png" alt="The Guttermen" style="height:3.5rem;margin:0 auto 1rem;">
          <h1 style="font-size:1.5rem;font-weight:800;color:#0b2d4e;margin-bottom:.25rem;">Pay Your Invoice</h1>
          <p style="color:#64748b;font-size:.9rem;">Secure payment powered by Authorize.net</p>
        </div>

        <!-- Form -->
        <form id="pay-form" onsubmit="submitPayment(event)">

          <div style="margin-bottom:1.25rem;">
            <label class="form-label" style="color:#334155;">Invoice / Job Number <span style="color:#94a3b8;font-weight:400;">(optional)</span></label>
            <input
              id="invoice"
              type="text"
              class="form-input"
              placeholder="e.g. 1042"
              style="margin-top:.375rem;"
            >
          </div>

          <div style="margin-bottom:1.75rem;">
            <label class="form-label" style="color:#334155;">Payment Amount <span style="color:#dc2626;">*</span></label>
            <div style="position:relative;margin-top:.375rem;">
              <span style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:#64748b;font-weight:600;">$</span>
              <input
                id="amount"
                type="number"
                min="1"
                step="0.01"
                class="form-input"
                placeholder="0.00"
                style="padding-left:2rem;"
                required
              >
            </div>
          </div>

          <!-- Error -->
          <div id="pay-error" style="display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:.5rem;padding:.875rem 1rem;margin-bottom:1.25rem;color:#dc2626;font-size:.875rem;"></div>

          <!-- Submit -->
          <button
            type="submit"
            id="pay-btn"
            class="btn-cyan"
            style="width:100%;font-size:1rem;"
          >
            Proceed to Secure Payment →
          </button>

        </form>

        <!-- Trust -->
        <div style="text-align:center;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid #f1f5f9;">
          <p style="font-size:.75rem;color:#94a3b8;">
            🔒 Secured by Authorize.net &nbsp;·&nbsp; We never store your card information
          </p>
        </div>

      </div>

      <!-- Back link -->
      <p style="text-align:center;margin-top:1.25rem;">
        <a href="/" style="color:#64748b;font-size:.875rem;text-decoration:none;">← Back to The Guttermen</a>
      </p>

    </div>
  </main>

  <script>
    async function submitPayment(e) {
      e.preventDefault();
      const btn = document.getElementById('pay-btn');
      const errEl = document.getElementById('pay-error');
      const amount = document.getElementById('amount').value;
      const invoice = document.getElementById('invoice').value;

      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Connecting to payment...';

      try {
        const res = await fetch('https://guttermen-payment.robertlbutt.workers.dev', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount, invoice })
        });
        const data = await res.json();
        if (data.url) {
          window.location.href = data.url;
        } else {
          throw new Error(data.error || 'Something went wrong. Please call us.');
        }
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Proceed to Secure Payment →';
      }
    }
  </script>

</body>
</html>
